server:
  port: 8080

spring:
  application:
    name: campus-gateway
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
  config:
    import: "optional:nacos:${spring.application.name}"
  main:
    web-application-type: reactive

  cloud:
    gateway:
      discovery:
        locator:
          enabled: true # 开启服务发现
          lower-case-service-id: true # 服务ID小写

      routes:
        # 用户服务路由
        - id: campus-service-user
          uri: http://localhost:8081
          predicates:
            - Path=/api/users/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10 # 每秒令牌生成速率
                redis-rate-limiter.burstCapacity: 20 # 令牌桶容量
                key-resolver: "#{@ipKeyResolver}"

        # 商品服务路由
        - id: campus-service-product
          uri: http://localhost:8082
          predicates:
            - Path=/api/products/**

        # 订单服务路由
        - id: campus-service-order
          uri: http://localhost:8083
          predicates:
            - Path=/api/orders/**

        # 兼职服务路由
        - id: campus-service-job
          uri: http://localhost:8084
          predicates:
            - Path=/api/jobs/**

        # 兼职申请服务路由
        - id: campus-service-job-applications
          uri: http://localhost:8084
          predicates:
            - Path=/api/job-applications/**

        # 通知服务路由
        - id: campus-service-notification
          uri: http://localhost:8085
          predicates:
            - Path=/api/notifications/**

        # 公共API文档路由
        - id: swagger-ui
          uri: http://localhost:8081 # 可以指向任意服务，实际项目中应该统一文档
          predicates:
            - Path=/swagger-ui/**
          filters:
            - StripPrefix=1

        - id: api-docs
          uri: http://localhost:8081
          predicates:
            - Path=/v3/api-docs/**
          filters:
            - StripPrefix=1

    nacos:
      discovery:
        enabled: true
        server-addr: ${NACOS_SERVER:localhost:8848}
        namespace: ${NACOS_NAMESPACE:}
        group: ${NACOS_GROUP:DEFAULT_GROUP}

      config:
        enabled: true
        server-addr: ${NACOS_SERVER:localhost:8848}
        namespace: ${NACOS_NAMESPACE:}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        file-extension: yaml
        refresh-enabled: true

  # Redis配置
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

# JWT配置
jwt:
  secret: ${JWT_SECRET:defaultSecretKeyForJwtTokenGenerationInCampusPlatform}
  expiration: ${JWT_EXPIRATION:86400000} # 24小时
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000} # 7天

# 日志配置
logging:
  level:
    com.xushu.campus.gateway: DEBUG
    org.springframework.cloud.gateway: DEBUG
    reactor.netty: INFO

# 管理端点
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always